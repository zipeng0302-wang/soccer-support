<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Website Favicon / 网站图标 -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- Responsive Viewport / 响应式视口设置，确保在手机和电脑上显示正常 -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Theme Color for Mobile Browsers / 移动端浏览器的地址栏主题颜色 -->
    <meta name="theme-color" content="#FACC15" />
    
    <!-- Meta Description for SEO / 搜索引擎优化描述，帮助别人通过搜索找到你的网站 -->
    <meta
      name="description"
      content="WW soccer support - Empowering a future star with AI technology"
    />
    
    <!-- iOS Icon / 苹果移动端图标 -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- 
      The manifest file provides metadata used when your web app is installed on a 
      user's mobile device or desktop.
      Manifest 文件定义了当你的网页被安装到移动端或桌面端时的相关信息。
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- 
      Preload Google Fonts to enhance the athletic tech feel.
      预加载 Google 字体，提升体育科技感。
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Website Title / 网页在浏览器标签页显示的标题 -->
    <title>WW soccer support | Empower A Future Star</title>
    
    <style>
      /* Global Base Styles / 全局基础样式
        Prevents white screen flash before React loads.
        防止 React 加载完成前出现白屏。
      */
      body {
        margin: 0;
        background-color: #FACC15; /* Your theme yellow / 你的主题黄色 */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Text shown if JavaScript is disabled / 如果浏览器禁用了 JavaScript，会显示以下提示 -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- 
      CRITICAL: The most important part! React will render all components inside this div.
      关键：最重要的部分！React 会将所有的组件（如 Home, Dashboard）渲染在这个 ID 为 root 的容器里。
    -->
    <div id="root"></div>

    <!-- 
      Note: In development mode (npm start), you don't need to manually link JS files.
      The build tools will automatically inject all code into the root div.
      注意：在开发模式下（运行 npm start），你不需要手动在这里引入 JS 文件。
      构建工具会自动将所有编写的代码注入到上述 root 容器中。
    -->
  </body>
</html>
